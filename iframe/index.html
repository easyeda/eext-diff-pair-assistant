<!doctype html>
<html lang="zh-Hans">
	<head>
		<title>差分对雷达</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			:root {
				color-scheme: light;
				--bg: #f6f7fb;
				--card: #ffffff;
				--text: #0f172a;
				--muted: #64748b;
				--primary: #2563eb;
				--primary-contrast: #ffffff;
				--border: #e2e8f0;
				--shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
				--success: #16a34a;
				--warning: #f59e0b;
				--danger: #ef4444;
				--chip: #f1f5f9;
				--soft: #f8fafc;
				--table-head: #f1f5f9;
				--table-hover: #f8fafc;
				--tag: #e2e8f0;
				--button: #eef2ff;
				--button-text: #334155;
			}

			[data-theme='dark'] {
				color-scheme: dark;
				--bg: #0b1220;
				--card: #0f172a;
				--text: #e2e8f0;
				--muted: #94a3b8;
				--primary: #60a5fa;
				--primary-contrast: #0b1220;
				--border: #1f2a44;
				--shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
				--chip: #1e293b;
				--soft: #111827;
				--table-head: #111827;
				--table-hover: #0f1b33;
				--tag: #1f2a44;
				--button: #1f2a44;
				--button-text: #e2e8f0;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				height: 100vh;
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'PingFang SC', 'Hiragino Sans GB',
					'Microsoft YaHei', sans-serif;
				background: var(--bg);
				color: var(--text);
				overflow: hidden;
				transition:
					background-color 0.25s ease,
					color 0.25s ease;
			}

			.app {
				display: flex;
				flex-direction: column;
				height: 100vh;
				padding: 20px 24px 28px;
				gap: 16px;
			}

			.titlebar {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 14px 16px;
				background: var(--card);
				border-radius: 14px;
				box-shadow: var(--shadow);
				transition:
					background-color 0.25s ease,
					box-shadow 0.25s ease;
			}

			.titlebar-left {
				display: flex;
				align-items: center;
				gap: 12px;
			}

			.titlebar-right {
				display: flex;
				align-items: center;
				gap: 12px;
				flex-wrap: wrap;
				color: var(--muted);
				font-weight: 600;
				font-size: 13px;
			}

			.rate-text {
				color: var(--muted);
				font-weight: 600;
				max-width: none;
				white-space: normal;
				overflow: visible;
				text-overflow: clip;
			}

			.version-badge {
				padding: 4px 10px;
				border-radius: 999px;
				background: var(--tag);
				color: var(--text);
				text-decoration: none;
			}

			.version-link {
				cursor: pointer;
			}

			.theme-toggle {
				display: inline-flex;
				align-items: center;
				justify-content: flex-start;
				height: 24px;
				padding: 0 24px;
				border-radius: 999px;
				font-size: 12px;
				line-height: 24px;
				background: var(--button);
				color: var(--button-text);
				position: relative;
				overflow: hidden;
				transition:
					background-color 0.2s ease,
					color 0.2s ease;
			}

			.theme-toggle::after {
				content: '';
				position: absolute;
				top: 2px;
				right: 2px;
				left: auto;
				width: 20px;
				height: 20px;
				border-radius: 999px;
				background: var(--text);
				transition:
					left 0.2s ease,
					right 0.2s ease,
					background-color 0.2s ease;
			}

			.theme-toggle[data-theme='dark']::after {
				left: 2px;
				right: auto;
			}

			.theme-toggle[data-theme='dark'] {
				justify-content: flex-end;
			}

			.window-controls {
				display: flex;
				gap: 8px;
				align-items: center;
			}

			.window-dot {
				width: 12px;
				height: 12px;
				border-radius: 999px;
				border: 1px solid rgba(15, 23, 42, 0.08);
				cursor: pointer;
			}

			.window-dot.close {
				background: #ff5f56;
			}

			.window-dot.minimize {
				background: #ffbd2e;
			}

			.window-dot.maximize {
				background: #27c93f;
			}

			.title {
				font-size: 16px;
				font-weight: 600;
			}

			button {
				border: none;
				border-radius: 10px;
				padding: 10px 16px;
				font-size: 14px;
				font-weight: 600;
				cursor: pointer;
				background: var(--button);
				color: var(--button-text);
				transition: all 0.2s ease;
			}

			button:hover {
				transform: translateY(-1px);
			}

			button.primary {
				background: var(--primary);
				color: var(--primary-contrast);
				box-shadow: 0 10px 18px rgba(37, 99, 235, 0.22);
			}

			.section {
				background: var(--card);
				border-radius: 14px;
				padding: 12px 16px;
				box-shadow: var(--shadow);
				display: flex;
				flex-direction: column;
				gap: 10px;
				transition:
					background-color 0.25s ease,
					box-shadow 0.25s ease;
			}

			.section-title {
				display: flex;
				align-items: center;
				justify-content: space-between;
				font-weight: 600;
				font-size: 14px;
				color: var(--muted);
			}

			.section-title-left {
				display: flex;
				align-items: center;
				gap: 12px;
			}

			input[type='checkbox'] {
				accent-color: var(--primary);
			}

			input[type='checkbox']:indeterminate {
				accent-color: var(--warning);
			}

			.section-title-right {
				display: flex;
				align-items: center;
				gap: 12px;
				color: var(--text);
			}

			.select-all {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				font-weight: 600;
				color: var(--text);
				cursor: pointer;
			}

			.length-toggle {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				font-weight: 600;
				color: var(--text);
				cursor: pointer;
			}

			.eye-toggle {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 26px;
				height: 26px;
				border-radius: 999px;
				border: none;
				background: var(--tag);
				color: var(--text);
				padding: 0;
				cursor: pointer;
			}

			.eye-toggle svg {
				width: 16px;
				height: 16px;
				display: block;
				fill: currentColor;
			}

			.rules-layout {
				display: flex;
				gap: 12px;
				align-items: flex-start;
				justify-content: space-between;
			}

			.rule-chips {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
				flex: 1;
				min-width: 0;
			}

			.chip {
				padding: 4px 22px 4px 8px;
				border-radius: 999px;
				background: var(--chip);
				font-size: 12px;
				font-weight: 600;
				color: var(--muted);
				position: relative;
				display: inline-flex;
				align-items: center;
				white-space: nowrap;
			}

			.chip .chip-remove {
				position: absolute;
				right: 6px;
				top: 50%;
				transform: translateY(-50%);
				width: 16px;
				height: 16px;
				border-radius: 999px;
				background: rgba(15, 23, 42, 0.12);
				color: var(--muted);
				font-size: 12px;
				display: none;
				align-items: center;
				justify-content: center;
				cursor: pointer;
			}

			.chip:hover .chip-remove {
				display: inline-flex;
			}

			.rule-add {
				display: flex;
				gap: 6px;
				align-items: center;
				background: var(--soft);
				padding: 6px;
				border-radius: 12px;
				border: 1px solid var(--border);
				flex: 0 0 auto;
			}

			.rule-add input {
				width: 70px;
				height: 28px;
				border-radius: 8px;
				border: 1px solid var(--border);
				font-size: 14px;
				text-align: left;
				padding: 0 8px;
				font-weight: 600;
				background: var(--card);
				color: var(--text);
			}

			.rule-add span {
				color: var(--muted);
				font-weight: 600;
			}

			.rule-add button {
				padding: 6px 8px;
			}

			.results {
				display: flex;
				flex-direction: column;
				gap: 12px;
				flex: 1;
				min-height: 0;
			}

			.result-list {
				display: flex;
				flex-direction: column;
				gap: 10px;
				flex: 1;
				min-height: 0;
				overflow: auto;
				padding-right: 4px;
			}

			.group {
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 10px;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}

			.group-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
			}

			.group-title {
				display: flex;
				align-items: center;
				gap: 10px;
				font-weight: 600;
			}

			.table {
				width: 100%;
				border-collapse: collapse;
				font-size: 13px;
			}

			.table thead th {
				text-align: left;
				padding: 6px 8px;
				background: var(--table-head);
				color: var(--muted);
				font-weight: 600;
				border-bottom: 1px solid var(--border);
				position: sticky;
				top: 0;
				z-index: 2;
			}

			.table tbody td {
				padding: 6px 8px;
				border-bottom: 1px solid var(--border);
				vertical-align: middle;
			}

			.table tbody tr:hover {
				background: var(--table-hover);
			}

			.cell-name {
				font-weight: 600;
			}

			.cell-muted {
				color: var(--muted);
			}

			.name-input {
				width: 100%;
				border: 1px solid transparent;
				background: transparent;
				border-radius: 8px;
				padding: 4px 6px;
				font-size: 13px;
				font-weight: 600;
				color: var(--text);
			}

			.name-input:focus {
				outline: none;
				border-color: var(--primary);
				background: var(--card);
				box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
			}

			.net-link {
				border: none;
				background: transparent;
				padding: 0;
				color: var(--primary);
				font-weight: 600;
				cursor: pointer;
				font-size: 13px;
			}

			.net-cell {
				display: flex;
				flex-direction: column;
				gap: 2px;
			}

			.net-length {
				font-size: 11px;
				color: var(--muted);
			}

			.header-meta {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 8px;
			}

			.header-inline {
				display: inline-flex;
				align-items: center;
				gap: 8px;
			}

			.sort-toggle {
				display: inline-flex;
				align-items: center;
				gap: 4px;
				background: transparent;
				color: var(--muted);
				font-weight: 600;
				padding: 0;
				border-radius: 0;
			}

			.sort-toggle:hover {
				transform: none;
				color: var(--text);
			}

			.sort-indicator {
				font-size: 12px;
				width: 12px;
				text-align: center;
			}

			.tag {
				padding: 4px 8px;
				border-radius: 8px;
				font-size: 12px;
				font-weight: 600;
				background: var(--tag);
				color: var(--muted);
			}

			.tag.positive {
				background: rgba(37, 99, 235, 0.12);
				color: var(--primary);
			}

			.tag.negative {
				background: rgba(239, 68, 68, 0.12);
				color: var(--danger);
			}

			.tag.exist {
				background: rgba(245, 158, 11, 0.16);
				color: var(--warning);
			}

			.footer {
				display: flex;
				align-items: center;
				justify-content: space-between;
				background: var(--card);
				border-radius: 14px;
				padding: 12px 16px;
				box-shadow: var(--shadow);
				gap: 16px;
				transition:
					background-color 0.25s ease,
					box-shadow 0.25s ease;
			}

			.status {
				color: var(--muted);
				font-size: 13px;
				display: inline-flex;
				align-items: center;
				gap: 6px;
			}

			.status-error {
				color: var(--danger);
			}

			.status-warning {
				color: var(--warning);
			}

			.status-info {
				color: var(--primary);
			}

			.status-success {
				color: var(--success);
			}

			.actions {
				display: flex;
				align-items: center;
				gap: 12px;
			}

			.loading {
				position: fixed;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				background: rgba(15, 23, 42, 0.2);
				backdrop-filter: blur(6px);
				z-index: 999;
			}

			.loading.active {
				display: flex;
			}

			.loading-card {
				background: var(--card);
				padding: 22px 26px;
				border-radius: 14px;
				box-shadow: var(--shadow);
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 12px;
				transition:
					background-color 0.25s ease,
					box-shadow 0.25s ease;
			}

			#loadingText {
				text-align: center;
				white-space: pre-line;
			}

			.spinner {
				width: 36px;
				height: 36px;
				border-radius: 999px;
				border: 4px solid var(--border);
				border-top-color: var(--primary);
				animation: spin 0.9s linear infinite;
			}

			.rule-tools {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				color: var(--muted);
				font-size: 12px;
				font-weight: 600;
			}

			.icon-button {
				width: 26px;
				height: 26px;
				border-radius: 999px;
				padding: 0;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				background: var(--tag);
				color: var(--text);
				font-size: 14px;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
		</style>
	</head>
	<body>
		<div class="app">
			<header class="titlebar">
				<div class="titlebar-left">
					<div class="window-controls">
						<div class="window-dot close" data-action="close"></div>
						<div class="window-dot minimize" data-action="minimize"></div>
						<div class="window-dot maximize" data-action="maximize"></div>
					</div>
					<div class="title">差分对雷达</div>
					<button class="theme-toggle" id="themeToggle">浅色</button>
				</div>
				<div class="titlebar-right">
					<span class="rate-text">👍鼓励一下 / 💡功能建议 👉👉👉</span>
					<a
						class="version-badge version-link"
						id="versionLink"
						href="https://ext.lceda.cn/item/zero1798/diff-pair-assistant"
						target="_blank"
						rel="noopener noreferrer"
					></a>
				</div>
			</header>

			<section class="section">
				<div class="section-title">
					<span>识别规则</span>
					<div class="rule-tools">
						<button class="icon-button" id="resetRulesBtn" type="button" title="重置为默认规则">↺</button>
						<span>重置为默认规则</span>
					</div>
				</div>
				<div class="rules-layout">
					<div class="rule-chips" id="ruleChips"></div>
					<div class="rule-add">
						<input id="ruleA" maxlength="16" placeholder="A" />
						<span>↔</span>
						<input id="ruleB" maxlength="16" placeholder="B" />
						<button id="addRuleBtn">添加规则</button>
					</div>
				</div>
			</section>

			<section class="section results">
				<div class="section-title">
					<div class="section-title-left">
						<span>识别结果</span>
						<label class="select-all"><input type="checkbox" id="selectAll" checked /> 全选</label>
					</div>
					<div class="section-title-right">
						<span id="summary"></span>
						<div class="length-toggle">
							<button class="eye-toggle" id="toggleLength" type="button" aria-pressed="false" title="显示长度/隐藏长度"></button>
							<span>长度</span>
						</div>
					</div>
				</div>
				<div class="result-list" id="resultList"></div>
			</section>

			<footer class="footer">
				<div class="status status-info" id="statusText">❔ 等待识别</div>
				<div class="actions">
					<button id="rescanBtn">重新识别</button>
					<button id="exportBtn">导出CSV</button>
					<button class="primary" id="applyBtnBottom">写入PCB</button>
				</div>
			</footer>
		</div>

		<div class="loading" id="loading">
			<div class="loading-card">
				<div class="spinner"></div>
				<div id="loadingText">正在识别差分对</div>
			</div>
		</div>

		<script>
			const APP_VERSION = '26.4.9';
			const STORAGE_KEY = 'diffPairRules';
			const THEME_KEY = 'diffPairTheme';
			const DEFAULT_RULES = [
				{ key: 'P1', label: 'P/N', a: 'P', b: 'N', priority: 1 },
				{ key: 'P2', label: 'P/M', a: 'P', b: 'M', priority: 2 },
				{ key: 'P3', label: '_H/_L', a: '_H', b: '_L', priority: 3 },
				{ key: 'P4', label: 'DP/DM', a: 'DP', b: 'DM', priority: 4 },
				{ key: 'P5', label: '_T/_C', a: '_T', b: '_C', priority: 5 },
				{ key: 'P6', label: '+/-', a: '+', b: '-', priority: 6 },
				{ key: 'P7', label: '∅/#', a: '', b: '#', priority: 7 },
				{ key: 'P8', label: '∅/_B', a: '', b: '_B', priority: 8 },
				{ key: 'P9', label: '_POS/_NEG', a: '_POS', b: '_NEG', priority: 9 },
			];

			const state = {
				defaultRules: DEFAULT_RULES.map((rule) => ({ ...rule })),
				customRules: [],
				rules: [],
				pairs: [],
				groups: [],
				existingMap: new Map(),
				netLengthMap: new Map(),
				showNetLength: false,
				highlightedNets: new Set(),
				selectedPairIds: new Set(),
				existSort: 'none',
				netSort: {
					key: null,
					dir: 'none',
				},
			};

			const elements = {
				ruleChips: document.getElementById('ruleChips'),
				ruleA: document.getElementById('ruleA'),
				ruleB: document.getElementById('ruleB'),
				addRuleBtn: document.getElementById('addRuleBtn'),
				rescanBtn: document.getElementById('rescanBtn'),
				exportBtn: document.getElementById('exportBtn'),
				applyBtnBottom: document.getElementById('applyBtnBottom'),
				resultList: document.getElementById('resultList'),
				summary: document.getElementById('summary'),
				statusText: document.getElementById('statusText'),
				selectAll: document.getElementById('selectAll'),
				toggleLength: document.getElementById('toggleLength'),
				loading: document.getElementById('loading'),
				loadingText: document.getElementById('loadingText'),
				themeToggle: document.getElementById('themeToggle'),
				versionLink: document.getElementById('versionLink'),
				resetRulesBtn: document.getElementById('resetRulesBtn'),
			};

			function renderLengthToggle() {
				if (!elements.toggleLength) return;
				const isOn = state.showNetLength;
				elements.toggleLength.setAttribute('aria-pressed', isOn ? 'true' : 'false');
				elements.toggleLength.title = '显示长度/隐藏长度';
				elements.toggleLength.innerHTML = isOn
					? `
						<svg viewBox="0 0 24 24" aria-hidden="true">
							<path d="M12 5c-5.5 0-9.7 4.3-10.7 6 .9 1.7 5.2 6 10.7 6s9.7-4.3 10.7-6C21.7 9.3 17.5 5 12 5zm0 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"></path>
							<circle cx="12" cy="11" r="2.2"></circle>
						</svg>
					`
					: `
						<svg viewBox="0 0 24 24" aria-hidden="true">
							<path d="M4.6 3.2 3.2 4.6l3 3C4 9.1 2.9 10.6 2.5 11.2c.9 1.7 5.2 6 10.7 6 1.8 0 3.4-.4 4.8-1l3.3 3.3 1.4-1.4L4.6 3.2zm7.9 11.9a4 4 0 0 1-4-4c0-.5.1-1 .3-1.5l5.2 5.2c-.5.2-1 .3-1.5.3zm4.7-2.2-2-2a4 4 0 0 0-5.1-5.1l-1.7-1.7A9.9 9.9 0 0 1 12 5c5.5 0 9.7 4.3 10.7 6-.3.6-1.6 2.5-3.7 4.1z"></path>
						</svg>
					`;
			}

			const isIFrameContext = Boolean(window.parent && window.parent !== window && window.parent.eda);
			const windowControls = document.querySelector('.window-controls');
			if (!isIFrameContext && windowControls) {
				windowControls.style.display = 'none';
			}

			function getEda() {
				if (window.eda) {
					return window.eda;
				}
				if (window.parent && window.parent.eda) {
					return window.parent.eda;
				}
				if (window.opener && window.opener.eda) {
					return window.opener.eda;
				}
				return null;
			}

			function setLoading(active, text) {
				elements.loading.classList.toggle('active', active);
				if (text) {
					elements.loadingText.textContent = text;
				}
			}

			function setStatus(text, severity = 'info') {
				const statusMap = {
					error: { icon: '❌' },
					warning: { icon: '⚠️' },
					info: { icon: '❔' },
					success: { icon: '✅' },
				};
				const safeSeverity = statusMap[severity] ? severity : 'info';
				const { icon } = statusMap[safeSeverity];
				elements.statusText.textContent = `${icon} ${text}`;
				elements.statusText.classList.remove('status-error', 'status-warning', 'status-info', 'status-success');
				elements.statusText.classList.add(`status-${safeSeverity}`);
			}

			function setTheme(theme) {
				const safeTheme = theme === 'dark' ? 'dark' : 'light';
				document.documentElement.setAttribute('data-theme', safeTheme);
				localStorage.setItem(THEME_KEY, safeTheme);
				if (elements.themeToggle) {
					elements.themeToggle.textContent = safeTheme === 'dark' ? '深色' : '浅色';
					elements.themeToggle.setAttribute('data-theme', safeTheme);
				}
			}

			function toggleTheme() {
				const current = document.documentElement.getAttribute('data-theme') || 'light';
				setTheme(current === 'dark' ? 'light' : 'dark');
			}

			function initTheme() {
				const stored = localStorage.getItem(THEME_KEY);
				setTheme(stored === 'dark' ? 'dark' : 'light');
			}

			function loadCustomRules() {
				try {
					const raw = localStorage.getItem(STORAGE_KEY);
					if (!raw) return [];
					const parsed = JSON.parse(raw);
					if (!Array.isArray(parsed)) return [];
					return parsed
						.map((item) => normalizeRule(item.a, item.b))
						.filter((item) => item)
						.map((item) => ({
							...item,
							custom: true,
							key: buildCustomRuleKey(item.a, item.b),
							priority: 1000,
						}));
				} catch (error) {
					return [];
				}
			}

			function saveCustomRules() {
				try {
					const payload = state.customRules.map((rule) => ({ a: rule.a, b: rule.b }));
					localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
				} catch (error) {
					setStatus('规则保存失败', 'error');
				}
			}

			function refreshRules() {
				state.rules = [...state.defaultRules, ...state.customRules];
				renderRules();
			}

			function formatRuleLabel(rule) {
				if (rule.label) return rule.label;
				const aText = rule.a ? rule.a : '∅';
				const bText = rule.b ? rule.b : '∅';
				return `${aText}/${bText}`;
			}

			function renderRules() {
				elements.ruleChips.innerHTML = '';
				state.rules.forEach((rule) => {
					const chip = document.createElement('div');
					chip.className = 'chip';
					chip.textContent = formatRuleLabel(rule);
					const remove = document.createElement('span');
					remove.className = 'chip-remove';
					remove.textContent = '×';
					remove.addEventListener('click', (event) => {
						event.stopPropagation();
						if (rule.custom) {
							state.customRules = state.customRules.filter((item) => item.key !== rule.key);
							saveCustomRules();
						} else {
							state.defaultRules = state.defaultRules.filter((item) => item.key !== rule.key);
						}
						refreshRules();
						scanPairs();
					});
					chip.appendChild(remove);
					elements.ruleChips.appendChild(chip);
				});
			}

			function normalizeRule(a, b) {
				const ra = (a ?? '').trim();
				const rb = (b ?? '').trim();
				if (!ra && !rb) return null;
				if (ra && rb && ra.toLowerCase() === rb.toLowerCase()) return null;
				return { a: ra, b: rb };
			}

			function buildCustomRuleKey(a, b) {
				return `custom:${a.toLowerCase()}|${b.toLowerCase()}`;
			}

			function hasRule(rule) {
				const key = buildCustomRuleKey(rule.a, rule.b);
				return state.rules.some((item) => item.key === key);
			}

			function cleanBaseName(name) {
				let result = name;
				while (result.startsWith('_') || result.startsWith('-') || result.startsWith('.') || result.startsWith('/')) {
					result = result.slice(1);
				}
				while (result.endsWith('_') || result.endsWith('-') || result.endsWith('.') || result.endsWith('/')) {
					result = result.slice(0, -1);
				}
				return result || name;
			}

			function buildExistingMap(existing) {
				state.existingMap.clear();
				existing.forEach((pair) => {
					const forward = `${pair.positiveNet}||${pair.negativeNet}`;
					const backward = `${pair.negativeNet}||${pair.positiveNet}`;
					state.existingMap.set(forward, pair.name);
					state.existingMap.set(backward, pair.name);
				});
			}

			function formatLength(length) {
				if (length === undefined || length === null || Number.isNaN(length)) {
					return '-';
				}
				if (!Number.isFinite(length)) {
					return '-';
				}
				return Number(length).toFixed(2);
			}

			async function ensureNetLengths(pairs) {
				if (!state.showNetLength) return;
				const eda = getEda();
				if (!eda || !eda.pcb_Net?.getNetLength) return;
				const pending = new Set();
				pairs.forEach((pair) => {
					if (!state.netLengthMap.has(pair.positiveNet)) {
						pending.add(pair.positiveNet);
					}
					if (!state.netLengthMap.has(pair.negativeNet)) {
						pending.add(pair.negativeNet);
					}
				});
				if (!pending.size) return;
				const requests = Array.from(pending).map(async (net) => {
					const length = await eda.pcb_Net.getNetLength(net);
					state.netLengthMap.set(net, length);
				});
				await Promise.all(requests);
			}

			function getRuleMatchers(rule) {
				const aMatchers = rule.aSuffixes ? [...rule.aSuffixes] : [rule.a ?? ''];
				const bMatchers = rule.bSuffixes ? [...rule.bSuffixes] : [rule.b ?? ''];
				return { aMatchers, bMatchers };
			}

			function matchSuffix(net, matcher) {
				if (typeof matcher === 'string') {
					const suffix = matcher;
					if (!suffix) {
						return { base: net, baseKey: net.toLowerCase() };
					}
					const lowerNet = net.toLowerCase();
					const lowerSuffix = suffix.toLowerCase();
					if (lowerNet.endsWith(lowerSuffix)) {
						const base = net.slice(0, net.length - suffix.length);
						return { base, baseKey: base.toLowerCase() };
					}
					if (lowerNet.startsWith(lowerSuffix)) {
						const base = net.slice(suffix.length);
						return { base, baseKey: base.toLowerCase() };
					}
					// 支持中间位置匹配
					const index = lowerNet.indexOf(lowerSuffix);
					if (index >= 0) {
						const base = net.slice(0, index) + net.slice(index + suffix.length);
						return { base, baseKey: base.toLowerCase() };
					}
					return null;
				}
				const match = net.match(matcher);
				if (!match) return null;
				const base = match[1] ?? '';
				return { base, baseKey: base.toLowerCase() };
			}

			function escapeRegExp(value) {
				return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
			}

			function normalizeNetByRule(net, rule) {
				const aText = rule.a ?? '';
				const bText = rule.b ?? '';
				const lowerNet = net.toLowerCase();
				const lowerA = aText.toLowerCase();
				const lowerB = bText.toLowerCase();
				const hasA = lowerA && lowerNet.includes(lowerA);
				const hasB = lowerB && lowerNet.includes(lowerB);
				if (!hasA && !hasB) return null;
				const token = '\u0000';
				const aRegex = new RegExp(escapeRegExp(aText), 'gi');
				const bRegex = new RegExp(escapeRegExp(bText), 'gi');
				const normalized = net.replace(aRegex, token).replace(bRegex, token);
				const base = normalized.split(token).join('');
				return {
					normalizedKey: normalized.toLowerCase(),
					base,
					hasA,
					hasB,
				};
			}

			function generatePairs(nets) {
				const pairs = [];
				const used = new Set();
				const nameCounts = new Map();

				state.rules.forEach((rule) => {
					const ruleKey = rule.key;
					const ruleLabel = formatRuleLabel(rule);
					const index = new Map();
					const useReplaceMatch = !rule.aSuffixes && !rule.bSuffixes && rule.a && rule.b;

					if (useReplaceMatch) {
						nets.forEach((net) => {
							const normalized = normalizeNetByRule(net, rule);
							if (!normalized) return;
							const key = `${ruleKey}|${normalized.normalizedKey}`;
							if (!index.has(key)) {
								index.set(key, { a: [], b: [], aSet: new Set(), bSet: new Set(), base: normalized.base });
							}
							const bucket = index.get(key);
							if (normalized.hasA && !bucket.aSet.has(net)) {
								bucket.aSet.add(net);
								bucket.a.push(net);
							}
							if (normalized.hasB && !bucket.bSet.has(net)) {
								bucket.bSet.add(net);
								bucket.b.push(net);
							}
						});
					} else {
						const { aMatchers, bMatchers } = getRuleMatchers(rule);
						nets.forEach((net) => {
							aMatchers.forEach((matcher) => {
								const matched = matchSuffix(net, matcher);
								if (!matched) return;
								const key = `${ruleKey}|${matched.baseKey}`;
								if (!index.has(key)) {
									index.set(key, { a: [], b: [], aSet: new Set(), bSet: new Set(), base: matched.base });
								}
								const bucket = index.get(key);
								if (!bucket.aSet.has(net)) {
									bucket.aSet.add(net);
									bucket.a.push(net);
								}
							});
							bMatchers.forEach((matcher) => {
								const matched = matchSuffix(net, matcher);
								if (!matched) return;
								const key = `${ruleKey}|${matched.baseKey}`;
								if (!index.has(key)) {
									index.set(key, { a: [], b: [], aSet: new Set(), bSet: new Set(), base: matched.base });
								}
								const bucket = index.get(key);
								if (!bucket.bSet.has(net)) {
									bucket.bSet.add(net);
									bucket.b.push(net);
								}
							});
						});
					}

					index.forEach((bucket) => {
						if (!bucket.a.length || !bucket.b.length) return;
						bucket.a.forEach((aNet) => {
							bucket.b.forEach((bNet) => {
								if (aNet === bNet) return;
								const pairKey = [aNet, bNet].sort().join('||');
								if (used.has(pairKey)) return;
								used.add(pairKey);
								const baseRaw = bucket.base;
								const rawName = cleanBaseName(baseRaw);
								const nameKey = rawName.toLowerCase();
								const count = nameCounts.get(nameKey) || 0;
								const name = count === 0 ? rawName : `${rawName}_${count + 1}`;
								nameCounts.set(nameKey, count + 1);
								const existingName = state.existingMap.get(`${aNet}||${bNet}`) || '';
								pairs.push({
									id: `${ruleKey}|${aNet}|${bNet}`,
									name,
									positiveNet: aNet,
									negativeNet: bNet,
									groupKey: ruleKey,
									ruleLabel,
									existingName,
								});
							});
						});
					});
				});

				return pairs;
			}

			function buildGroups(pairs) {
				const groupMap = new Map();
				pairs.forEach((pair) => {
					if (!groupMap.has(pair.groupKey)) {
						groupMap.set(pair.groupKey, { key: pair.groupKey, label: pair.ruleLabel, pairs: [] });
					}
					groupMap.get(pair.groupKey).pairs.push(pair);
				});
				const ordered = [];
				state.rules.forEach((rule) => {
					const key = rule.key;
					if (groupMap.has(key)) {
						ordered.push(groupMap.get(key));
					}
				});
				return ordered;
			}

			function setPairSelected(pairId, selected) {
				if (selected) {
					state.selectedPairIds.add(pairId);
				} else {
					state.selectedPairIds.delete(pairId);
				}
			}

			function updateSelectAllState() {
				if (!state.pairs.length) {
					elements.selectAll.checked = false;
					elements.selectAll.indeterminate = false;
					return;
				}
				const selectedCount = state.selectedPairIds.size;
				if (selectedCount === 0) {
					elements.selectAll.checked = false;
					elements.selectAll.indeterminate = false;
					return;
				}
				if (selectedCount === state.pairs.length) {
					elements.selectAll.checked = true;
					elements.selectAll.indeterminate = false;
					return;
				}
				elements.selectAll.checked = false;
				elements.selectAll.indeterminate = true;
			}

			function updateGroupToggleState(groupKey) {
				const group = state.groups.find((item) => item.key === groupKey);
				if (!group) return;
				const selectedCount = group.pairs.reduce((total, pair) => (state.selectedPairIds.has(pair.id) ? total + 1 : total), 0);
				const allSelected = selectedCount === group.pairs.length && group.pairs.length > 0;
				const groupToggle = document.querySelector(`.group-toggle[data-group-key="${groupKey}"]`);
				if (groupToggle) {
					groupToggle.checked = allSelected;
					groupToggle.indeterminate = selectedCount > 0 && selectedCount < group.pairs.length;
				}
			}

			function syncSelectionFromDom() {
				const pairToggles = document.querySelectorAll('.pair-toggle');
				if (!pairToggles.length) return;
				const selectedIds = new Set();
				pairToggles.forEach((toggle) => {
					if (toggle.checked && toggle.dataset.pairId) {
						selectedIds.add(toggle.dataset.pairId);
					}
				});
				state.selectedPairIds = selectedIds;
			}

			function getSortIndicator(dir) {
				if (dir === 'asc') {
					return '↑';
				}
				if (dir === 'desc') {
					return '↓';
				}
				return '↕';
			}

			function getExistSortIndicator() {
				if (state.existSort === 'existFirst') {
					return '↑';
				}
				if (state.existSort === 'missingFirst') {
					return '↓';
				}
				return '↕';
			}

			function toggleExistSort() {
				state.netSort = { key: null, dir: 'none' };
				if (state.existSort === 'none') {
					state.existSort = 'existFirst';
				} else if (state.existSort === 'existFirst') {
					state.existSort = 'missingFirst';
				} else {
					state.existSort = 'none';
				}
				renderResults();
			}

			function toggleNetSort(key) {
				state.existSort = 'none';
				if (state.netSort.key !== key) {
					state.netSort = { key, dir: 'asc' };
					renderResults();
					return;
				}
				if (state.netSort.dir === 'asc') {
					state.netSort = { key, dir: 'desc' };
				} else if (state.netSort.dir === 'desc') {
					state.netSort = { key: null, dir: 'none' };
				} else {
					state.netSort = { key, dir: 'asc' };
				}
				renderResults();
			}

			function getNetSortIndicator(key) {
				if (state.netSort.key !== key) {
					return '↕';
				}
				return getSortIndicator(state.netSort.dir);
			}

			function getSortedPairs(pairs) {
				if (state.netSort.key && state.netSort.dir !== 'none') {
					const direction = state.netSort.dir === 'asc' ? 1 : -1;
					const field = state.netSort.key;
					return pairs
						.map((pair, index) => ({ pair, index }))
						.sort((a, b) => {
							const aVal = field === 'positive' ? a.pair.positiveNet : a.pair.negativeNet;
							const bVal = field === 'positive' ? b.pair.positiveNet : b.pair.negativeNet;
							const result = aVal.localeCompare(bVal, 'zh-Hans', { numeric: true, sensitivity: 'base' });
							if (result !== 0) {
								return result * direction;
							}
							return a.index - b.index;
						})
						.map((item) => item.pair);
				}
				if (state.existSort === 'none') {
					return pairs;
				}
				const direction = state.existSort === 'existFirst' ? -1 : 1;
				return pairs
					.map((pair, index) => ({ pair, index }))
					.sort((a, b) => {
						const aVal = a.pair.existingName ? 1 : 0;
						const bVal = b.pair.existingName ? 1 : 0;
						if (aVal !== bVal) {
							return (aVal - bVal) * direction;
						}
						return a.index - b.index;
					})
					.map((item) => item.pair);
			}

				elements.resultList.innerHTML = '';
				let total = 0;
				let existCount = 0;

				state.groups.forEach((group) => {
					const groupEl = document.createElement('div');
					groupEl.className = 'group';

					const groupCheckbox = document.createElement('input');
					groupCheckbox.type = 'checkbox';
					const groupSelectedCount = group.pairs.reduce((total, pair) => (state.selectedPairIds.has(pair.id) ? total + 1 : total), 0);
					groupCheckbox.checked = groupSelectedCount === group.pairs.length && group.pairs.length > 0;
					groupCheckbox.indeterminate = groupSelectedCount > 0 && groupSelectedCount < group.pairs.length;
					groupCheckbox.className = 'group-toggle';
					groupCheckbox.dataset.groupKey = group.key;

					const table = document.createElement('table');
					table.className = 'table';

					const thead = document.createElement('thead');
					const headRow = document.createElement('tr');

					const toggleHeader = document.createElement('th');
					toggleHeader.style.width = '40px';
					toggleHeader.appendChild(groupCheckbox);

					const ruleHeader = document.createElement('th');
					ruleHeader.style.width = '120px';
					const ruleHeaderMeta = document.createElement('div');
					ruleHeaderMeta.className = 'header-inline';
					const ruleLabel = document.createElement('span');
					ruleLabel.textContent = group.label;
					const count = document.createElement('span');
					count.className = 'tag';
					count.textContent = `${group.pairs.length} 对`;
					ruleHeaderMeta.appendChild(ruleLabel);
					ruleHeaderMeta.appendChild(count);
					ruleHeader.appendChild(ruleHeaderMeta);

					const nameHeader = document.createElement('th');
					nameHeader.textContent = '差分对名';

					const positiveHeader = document.createElement('th');
					const positiveSortBtn = document.createElement('button');
					positiveSortBtn.type = 'button';
					positiveSortBtn.className = 'sort-toggle';
					const positiveLabel = document.createElement('span');
					positiveLabel.textContent = '正网络';
					const positiveIndicator = document.createElement('span');
					positiveIndicator.className = 'sort-indicator';
					positiveIndicator.textContent = getNetSortIndicator('positive');
					positiveSortBtn.appendChild(positiveLabel);
					positiveSortBtn.appendChild(positiveIndicator);
					positiveSortBtn.addEventListener('click', () => toggleNetSort('positive'));
					positiveHeader.appendChild(positiveSortBtn);

					const negativeHeader = document.createElement('th');
					const negativeSortBtn = document.createElement('button');
					negativeSortBtn.type = 'button';
					negativeSortBtn.className = 'sort-toggle';
					const negativeLabel = document.createElement('span');
					negativeLabel.textContent = '负网络';
					const negativeIndicator = document.createElement('span');
					negativeIndicator.className = 'sort-indicator';
					negativeIndicator.textContent = getNetSortIndicator('negative');
					negativeSortBtn.appendChild(negativeLabel);
					negativeSortBtn.appendChild(negativeIndicator);
					negativeSortBtn.addEventListener('click', () => toggleNetSort('negative'));
					negativeHeader.appendChild(negativeSortBtn);

					const existHeader = document.createElement('th');
					existHeader.style.width = '140px';
					const existHeaderMeta = document.createElement('button');
					existHeaderMeta.type = 'button';
					existHeaderMeta.className = 'sort-toggle';
					const existLabel = document.createElement('span');
					existLabel.textContent = '是否已存在';
					const indicator = document.createElement('span');
					indicator.className = 'sort-indicator';
					indicator.textContent = getExistSortIndicator();
					existHeaderMeta.appendChild(existLabel);
					existHeaderMeta.appendChild(indicator);
					existHeaderMeta.addEventListener('click', toggleExistSort);
					existHeader.appendChild(existHeaderMeta);

					headRow.appendChild(toggleHeader);
					headRow.appendChild(ruleHeader);
					headRow.appendChild(nameHeader);
					headRow.appendChild(positiveHeader);
					headRow.appendChild(negativeHeader);
					headRow.appendChild(existHeader);
					thead.appendChild(headRow);

					const tbody = document.createElement('tbody');

					const sortedPairs = getSortedPairs(group.pairs);
					sortedPairs.forEach((pair, index) => {
						total += 1;
						if (pair.existingName) {
							existCount += 1;
						}

						const pairCheckbox = document.createElement('input');
						pairCheckbox.type = 'checkbox';
						pairCheckbox.checked = state.selectedPairIds.has(pair.id);
						pairCheckbox.className = 'pair-toggle';
						pairCheckbox.dataset.pairId = pair.id;
						pairCheckbox.dataset.groupKey = group.key;

						const row = document.createElement('tr');
						const checkboxCell = document.createElement('td');
						checkboxCell.appendChild(pairCheckbox);

						const indexCell = document.createElement('td');
						indexCell.className = 'cell-muted';
						indexCell.textContent = `${index + 1}`;

						const nameCell = document.createElement('td');
						const nameInput = document.createElement('input');
						nameInput.className = 'name-input';
						nameInput.value = pair.name;
						nameInput.addEventListener('input', () => {
							pair.name = nameInput.value;
						});
						nameInput.addEventListener('blur', () => {
							const next = nameInput.value.trim();
							if (!next) {
								nameInput.value = pair.name || '';
								return;
							}
							pair.name = next;
							nameInput.value = next;
						});
						nameCell.appendChild(nameInput);

						const positiveCell = document.createElement('td');
						const positiveBtn = document.createElement('button');
						positiveBtn.type = 'button';
						positiveBtn.className = 'net-link';
						positiveBtn.textContent = pair.positiveNet;
						positiveBtn.addEventListener('click', () => locateNet(pair.positiveNet));
						const positiveWrap = document.createElement('div');
						positiveWrap.className = 'net-cell';
						positiveWrap.appendChild(positiveBtn);
						if (state.showNetLength) {
							const positiveLength = document.createElement('div');
							positiveLength.className = 'net-length';
							positiveLength.textContent = formatLength(state.netLengthMap.get(pair.positiveNet));
							positiveWrap.appendChild(positiveLength);
						}
						positiveCell.appendChild(positiveWrap);

						const negativeCell = document.createElement('td');
						const negativeBtn = document.createElement('button');
						negativeBtn.type = 'button';
						negativeBtn.className = 'net-link';
						negativeBtn.textContent = pair.negativeNet;
						negativeBtn.addEventListener('click', () => locateNet(pair.negativeNet));
						const negativeWrap = document.createElement('div');
						negativeWrap.className = 'net-cell';
						negativeWrap.appendChild(negativeBtn);
						if (state.showNetLength) {
							const negativeLength = document.createElement('div');
							negativeLength.className = 'net-length';
							negativeLength.textContent = formatLength(state.netLengthMap.get(pair.negativeNet));
							negativeWrap.appendChild(negativeLength);
						}
						negativeCell.appendChild(negativeWrap);

						const existCell = document.createElement('td');
						if (pair.existingName) {
							const existTag = document.createElement('span');
							existTag.className = 'tag exist';
							existTag.textContent = '已存在';
							existCell.appendChild(existTag);
						} else {
							const existText = document.createElement('span');
							existText.className = 'cell-muted';
							existText.textContent = '否';
							existCell.appendChild(existText);
						}

						row.appendChild(checkboxCell);
						row.appendChild(indexCell);
						row.appendChild(nameCell);
						row.appendChild(positiveCell);
						row.appendChild(negativeCell);
						row.appendChild(existCell);
						tbody.appendChild(row);
					});

					table.appendChild(thead);
					table.appendChild(tbody);
					groupEl.appendChild(table);

					elements.resultList.appendChild(groupEl);
				});

				elements.summary.textContent = total ? `共 ${total} 对，已存在 ${existCount} 对` : '未找到可识别的差分对';
				setStatus(total ? '识别完成' : '未识别到差分对', total ? 'success' : 'warning');
				updateSelectAllState();
				wireGroupCheckboxes();
			}

			function wireGroupCheckboxes() {
				const groupToggles = document.querySelectorAll('.group-toggle');
				groupToggles.forEach((toggle) => {
					toggle.addEventListener('change', (event) => {
						const groupKey = event.target.dataset.groupKey;
						event.target.indeterminate = false;
						const groupPairs = document.querySelectorAll(`.pair-toggle[data-group-key="${groupKey}"]`);
						groupPairs.forEach((pairToggle) => {
							pairToggle.checked = event.target.checked;
							setPairSelected(pairToggle.dataset.pairId, event.target.checked);
						});
						updateGroupToggleState(groupKey);
						updateSelectAllState();
					});
				});

				const pairToggles = document.querySelectorAll('.pair-toggle');
				pairToggles.forEach((toggle) => {
					toggle.addEventListener('change', () => {
						setPairSelected(toggle.dataset.pairId, toggle.checked);
						updateGroupToggleState(toggle.dataset.groupKey);
						updateSelectAllState();
					});
				});
			}

			function getSelectedPairs() {
				syncSelectionFromDom();
				return state.pairs.filter((pair) => state.selectedPairIds.has(pair.id));
			}

			async function clearAllHighlights(eda) {
				if (eda.pcb_Net?.unhighlightAllNets) {
					await eda.pcb_Net.unhighlightAllNets();
					state.highlightedNets.clear();
					return;
				}
				if (eda.pcb_Net?.getAllNetsName && eda.pcb_Net?.unhighlightNet) {
					const nets = await eda.pcb_Net.getAllNetsName();
					const tasks = nets.map((net) => eda.pcb_Net.unhighlightNet(net));
					await Promise.all(tasks);
					state.highlightedNets.clear();
					return;
				}
				if (eda.pcb_Net?.unhighlightNet && state.highlightedNets.size) {
					const tasks = Array.from(state.highlightedNets).map((highlighted) => eda.pcb_Net.unhighlightNet(highlighted));
					await Promise.all(tasks);
					state.highlightedNets.clear();
				}
			}

			async function locateNet(net) {
				const eda = getEda();
				if (!eda) {
					setStatus('未检测到 EDA 环境', 'error');
					return;
				}
				try {
					if (eda.pcb_SelectControl?.clearSelected) {
						await eda.pcb_SelectControl.clearSelected();
					}
					await clearAllHighlights(eda);
					if (eda.pcb_Net?.selectNet) {
						await eda.pcb_Net.selectNet(net);
					}
					if (eda.dmt_EditorControl?.zoomToSelectedPrimitives) {
						await eda.dmt_EditorControl.zoomToSelectedPrimitives();
					}
					if (eda.pcb_Net?.highlightNet) {
						await eda.pcb_Net.highlightNet(net);
						state.highlightedNets.add(net);
					}
				} catch (error) {
					setStatus('定位网络失败', 'error');
				}
			}

			function escapeCsv(value) {
				const text = value === undefined || value === null ? '' : String(value);
				if (/[",\n]/.test(text)) {
					return `"${text.replace(/"/g, '""')}"`;
				}
				return text;
			}

			function exportCsv() {
				const selected = getSelectedPairs();
				if (!selected.length) {
					setStatus('未选择任何差分对', 'warning');
					return;
				}
				const rows = [['差分对名', '正网络', '负网络', '是否已存在']];
				selected.forEach((pair) => {
					rows.push([pair.name, pair.positiveNet, pair.negativeNet, pair.existingName ? '是' : '否']);
				});
				const csv = `\ufeff${rows.map((row) => row.map((cell) => escapeCsv(cell)).join(',')).join('\n')}`;
				const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
				const url = URL.createObjectURL(blob);
				const link = document.createElement('a');
				const date = new Date().toISOString().slice(0, 10);
				link.href = url;
				link.download = `diff_pairs_${date}.csv`;
				document.body.appendChild(link);
				link.click();
				link.remove();
				URL.revokeObjectURL(url);
				setStatus('已导出 CSV', 'success');
			}

			async function scanPairs() {
				const eda = getEda();
				if (!eda) {
					setStatus('未检测到 EDA 环境', 'error');
					return;
				}
				setLoading(true, '正在识别差分对');
				try {
					const pcbInfo = await eda.dmt_Pcb.getCurrentPcbInfo();
					if (!pcbInfo) {
						setStatus('未找到当前 PCB', 'error');
						setLoading(false);
						return;
					}
					const nets = await eda.pcb_Net.getAllNetsName();
					const existing = await eda.pcb_Drc.getAllDifferentialPairs();
					buildExistingMap(existing);
					state.pairs = generatePairs(nets);
					state.selectedPairIds = new Set(state.pairs.map((pair) => pair.id));
					state.groups = buildGroups(state.pairs);
					await ensureNetLengths(state.pairs);
					renderResults();
				} catch (error) {
					setStatus('识别失败，请重试', 'error');
				} finally {
					setLoading(false);
				}
			}

			async function applyPairs() {
				const eda = getEda();
				if (!eda) {
					setStatus('未检测到 EDA 环境', 'error');
					return;
				}
				const selected = getSelectedPairs();
				if (!selected.length) {
					setStatus('未选择任何差分对', 'warning');
					return;
				}
				const toWrite = selected.filter((pair) => !pair.existingName);
				const totalWrite = toWrite.length;
				let success = 0;
				let skipped = selected.length - totalWrite;
				let failed = 0;
				const updateWriteLoading = () => {
					setLoading(true, `正在写入差分对\n${success}/${totalWrite}`);
				};
				try {
					if (!totalWrite) {
						setStatus(`写入完成：成功 0，跳过 ${skipped}，失败 0`, 'info');
						return;
					}
					updateWriteLoading();
					const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
					const createPairWithRetry = async (pair) => {
						for (let attempt = 0; attempt < 3; attempt += 1) {
							try {
								const ok = await eda.pcb_Drc.createDifferentialPair(pair.name, pair.positiveNet, pair.negativeNet);
								if (ok) return true;
							} catch (error) {
								if (attempt === 2) throw error;
							}
							await wait(40);
						}
						return false;
					};
					for (const pair of toWrite) {
						try {
							const ok = await createPairWithRetry(pair);
							if (ok) {
								success += 1;
								state.existingMap.set(`${pair.positiveNet}||${pair.negativeNet}`, pair.name);
								pair.existingName = pair.name;
							} else {
								failed += 1;
							}
						} catch (error) {
							failed += 1;
						} finally {
							updateWriteLoading();
						}
					}
					const severity = failed > 0 ? 'warning' : success > 0 ? 'success' : 'info';
					setStatus(`写入完成：成功 ${success}，跳过 ${skipped}，失败 ${failed}`, severity);
					state.groups = buildGroups(state.pairs);
					renderResults();
				} catch (error) {
					setStatus('写入失败，请重试', 'error');
				} finally {
					setLoading(false);
				}
			}

			function bindEvents() {
				elements.addRuleBtn.addEventListener('click', () => {
					const rule = normalizeRule(elements.ruleA.value, elements.ruleB.value);
					if (!rule) {
						setStatus('请输入两个长度相同且不同的规则', 'warning');
						return;
					}
					if (!hasRule(rule)) {
						state.customRules.push({ ...rule, custom: true, key: buildCustomRuleKey(rule.a, rule.b), priority: 1000 });
						saveCustomRules();
						refreshRules();
						scanPairs();
					}
					elements.ruleA.value = '';
					elements.ruleB.value = '';
				});
				const handleRuleEnter = (event) => {
					if (event.key === 'Enter') {
						event.preventDefault();
						elements.addRuleBtn.click();
					}
				};
				elements.ruleA.addEventListener('keydown', handleRuleEnter);
				elements.ruleB.addEventListener('keydown', handleRuleEnter);

				elements.rescanBtn.addEventListener('click', () => scanPairs());
				elements.exportBtn.addEventListener('click', () => exportCsv());
				elements.applyBtnBottom.addEventListener('click', () => applyPairs());
				if (elements.toggleLength) {
					elements.toggleLength.addEventListener('click', async () => {
						state.showNetLength = !state.showNetLength;
						renderLengthToggle();
						await ensureNetLengths(state.pairs);
						renderResults();
					});
				}
				elements.selectAll.addEventListener('change', (event) => {
					const checked = event.target.checked;
					event.target.indeterminate = false;
					state.selectedPairIds = checked ? new Set(state.pairs.map((pair) => pair.id)) : new Set();
					const pairToggles = document.querySelectorAll('.pair-toggle');
					pairToggles.forEach((toggle) => {
						toggle.checked = checked;
					});
					const groupToggles = document.querySelectorAll('.group-toggle');
					groupToggles.forEach((toggle) => {
						toggle.checked = checked;
						toggle.indeterminate = false;
					});
				});

				if (elements.themeToggle) {
					elements.themeToggle.addEventListener('click', toggleTheme);
				}

				if (elements.resetRulesBtn) {
					elements.resetRulesBtn.addEventListener('click', () => {
						state.defaultRules = DEFAULT_RULES.map((rule) => ({ ...rule }));
						state.customRules = [];
						saveCustomRules();
						refreshRules();
						scanPairs();
						setStatus('已重置为默认规则', 'success');
					});
				}

				const controlButtons = document.querySelectorAll('.window-dot');
				controlButtons.forEach((button) => {
					button.addEventListener('click', () => {
						const action = button.dataset.action;
						const eda = getEda();
						if (action === 'close') {
							if (isIFrameContext && eda?.sys_IFrame?.closeIFrame) {
								eda.sys_IFrame.closeIFrame('diff-pair-assistant');
							} else {
								window.close();
							}
						} else if (action === 'minimize') {
							if (isIFrameContext && eda?.sys_IFrame?.hideIFrame) {
								eda.sys_IFrame.hideIFrame('diff-pair-assistant');
							}
						} else if (action === 'maximize') {
							if (isIFrameContext && eda?.sys_IFrame?.showIFrame) {
								eda.sys_IFrame.showIFrame('diff-pair-assistant');
							}
						}
					});
				});
			}

			if (elements.versionLink) {
				elements.versionLink.textContent = `v${APP_VERSION}`;
			}

			state.customRules = loadCustomRules();
			initTheme();
			renderLengthToggle();
			refreshRules();
			bindEvents();
			scanPairs();
		</script>
	</body>
</html>
